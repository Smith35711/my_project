name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:                           # 允许手动触发

permissions:
  contents: write                              # 创建 Release 需要写权限
  actions: read
  checks: write

env:
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  # ============================================================
  # Stage 1: 代码静态检查
  # ============================================================
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format cppcheck

      - name: clang-format check
        run: |
          find src/ -name '*.c' -o -name '*.h' 2>/dev/null | xargs clang-format --dry-run --Werror || \
            echo "::warning::clang-format 检查失败，请运行 clang-format -i src/**/*.c src/**/*.h"

      - name: cppcheck
        run: |
          cppcheck --enable=all --inconclusive --error-exitcode=1 src/ 2>&1 | tee cppcheck.log
          echo "::notice::cppcheck completed"

  # ============================================================
  # Stage 2: 构建 (Debug + Release)
  # ============================================================
  build:
    name: Build (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake gcc

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.build_type }}
          path: build/
          retention-days: 7

  # ============================================================
  # Stage 3: Sanitizer 全量检查（ASan + UBSan + TSan）
  # ============================================================
  sanitizers:
    name: Sanitizer Check (${{ matrix.san }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - san: ASan+UBSan
            opts: -DENABLE_ASAN=ON -DENABLE_UBSAN=ON -DENABLE_LSAN=ON -DENABLE_TSAN=OFF -DENABLE_MSAN=OFF
          - san: TSan
            opts: -DENABLE_ASAN=OFF -DENABLE_UBSAN=OFF -DENABLE_LSAN=OFF -DENABLE_TSAN=ON -DENABLE_MSAN=OFF
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake gcc

      - name: Configure (${{ matrix.san }})
        run: cmake -B build-san -DCMAKE_BUILD_TYPE=Debug ${{ matrix.opts }}

      - name: Build (${{ matrix.san }})
        run: cmake --build build-san --parallel $(nproc)

      - name: Test (${{ matrix.san }})
        run: |
          cd build-san
          # 设置 ASan 选项
          export ASAN_OPTIONS="detect_leaks=1:check_initialization_order=1:strict_string_checks=1:detect_stack_use_after_return=1:abort_on_error=1"
          export UBSAN_OPTIONS="print_stacktrace=1:abort_on_error=1"
          export TSAN_OPTIONS="abort_on_error=1:history_size=7"
          ctest --output-on-failure || true
          # 如果存在 test_runner 则直接运行
          [ -x test_runner ] && ./test_runner 2>&1 | tee sanitizer-output.log || true

      - name: Upload sanitizer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-log-${{ matrix.san }}
          path: build-san/sanitizer-output.log
          retention-days: 7

  # ============================================================
  # Stage 4: 测试 + Valgrind
  # ============================================================
  test:
    name: Test & Valgrind
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq valgrind

      - name: Download Debug binary
        uses: actions/download-artifact@v4
        with:
          name: binary-Debug
          path: build/

      - name: Run tests
        run: |
          cd build
          chmod +x test_runner 2>/dev/null || true
          ctest --output-on-failure

      - name: Valgrind memory check
        if: always()
        run: |
          cd build
          if [ -x test_runner ]; then
            valgrind --leak-check=full --show-leak-kinds=all \
              --track-origins=yes --error-exitcode=1 \
              ./test_runner 2>&1 | tee valgrind.log
          fi

      - name: Upload valgrind log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report
          path: build/valgrind.log
          retention-days: 7

  # ============================================================
  # Stage 5: 覆盖率
  # ============================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lcov

      - name: Download Debug binary
        uses: actions/download-artifact@v4
        with:
          name: binary-Debug
          path: build/

      - name: Generate coverage report
        run: |
          cd build
          chmod +x test_runner 2>/dev/null || true
          ctest --output-on-failure || true
          lcov --capture --directory . --output-file coverage.info 2>/dev/null || true
          lcov --remove coverage.info '/usr/*' '*/tests/*' --output-file coverage.info 2>/dev/null || true
          lcov --list coverage.info 2>/dev/null || true
          genhtml coverage.info --output-directory coverage_html 2>/dev/null || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage_html/
          retention-days: 7

      - name: Coverage summary
        run: |
          COV=$(lcov --summary build/coverage.info 2>&1 | grep lines | cut -d: -f2 | tr -d ' ')
          echo "::notice::Line coverage: ${COV:-N/A}"

  # ============================================================
  # Stage 6: 打包
  # ============================================================
  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [test, sanitizers]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download Release binary
        uses: actions/download-artifact@v4
        with:
          name: binary-Release
          path: build/

      - name: Package as tar.gz
        run: |
          mkdir -p dist
          cd build
          tar czf ../dist/${GITHUB_REPOSITORY##*/}-${GITHUB_SHA:0:7}.tar.gz .

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: dist/
          retention-days: 30

  # ============================================================
  # Stage 7: Release
  # ============================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
